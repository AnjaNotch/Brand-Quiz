let current = 0;
let answers = new Array(5).fill(null);
let scores = { a: 0, b: 0, c: 0, d: 0, e: 0 };

function buildQuestions() {
  const container = document.getElementById('questions');
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card' + (qi === 0 ? ' active' : '');
    card.id = `q${qi}`;
    card.innerHTML = `
      <div class="q-num">Question ${qi + 1} of ${5}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-sub">${q.sub}</div>
      <div class="options">
        ${q.options.map((opt, oi) => `
          <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
            <div class="opt-circle"></div>
            <div class="opt-body">
              <div class="opt-label">${opt.label}</div>
              ${opt.desc ? `<div class="opt-desc">${opt.desc}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(card);
  });
}

function selectOption(qi, oi) {
  // Deselect all
  questions[qi].options.forEach((_, i) => {
    document.getElementById(`opt-${qi}-${i}`)?.classList.remove('selected');
  });
  // Select chosen
  document.getElementById(`opt-${qi}-${oi}`)?.classList.add('selected');
  answers[qi] = oi;
  document.getElementById('btnNext').classList.add('ready');
}

function updateProgress() {
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Question ${current + 1} of ${5}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('btnBack').disabled = current === 0;
}

function goNext() {
  if (answers[current] === null) return;
  // Apply scores
  const scoreObj = questions[current].options[answers[current]].score;
  Object.entries(scoreObj).forEach(([k, v]) => {
    if (scores[k] !== undefined) scores[k] += v;
  });

  if (current < questions.length - 1) {
    document.getElementById(`q${current}`).classList.remove('active');
    current++;
    document.getElementById(`q${current}`).classList.add('active');
    document.getElementById('btnNext').classList.remove('ready');
    if (answers[current] !== null) document.getElementById('btnNext').classList.add('ready');
    updateProgress();

    if (current === questions.length - 1) {
      document.getElementById('btnNext').textContent = 'See My Result →';
    }
  } else {
    showResult();
  }
}

function goBack() {
  if (current === 0) return;
  // Undo score
  const scoreObj = questions[current].options[answers[current]]?.score || {};
  Object.entries(scoreObj).forEach(([k, v]) => { if (scores[k] !== undefined) scores[k] -= v; });

  document.getElementById(`q${current}`).classList.remove('active');
  current--;
  document.getElementById(`q${current}`).classList.add('active');
  document.getElementById('btnNext').textContent = current === questions.length - 1 ? 'See My Result →' : 'Next →';
  if (answers[current] !== null) document.getElementById('btnNext').classList.add('ready');
  else document.getElementById('btnNext').classList.remove('ready');
  updateProgress();
}
